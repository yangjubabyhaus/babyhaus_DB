<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#2d2a26"/>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <defs>
    <radialGradient id="bg" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#3a3530"/>
      <stop offset="100%" stop-color="#1a1714"/>
    </radialGradient>
  </defs>
  <!-- Bottle body -->
  <rect x="196" y="200" width="120" height="180" rx="30" fill="#7aab8a"/>
  <!-- Bottle neck -->
  <rect x="216" y="155" width="80" height="55" rx="10" fill="#7aab8a"/>
  <!-- Bottle nipple -->
  <ellipse cx="256" cy="148" rx="22" ry="16" fill="#558a68"/>
  <ellipse cx="256" cy="140" rx="12" ry="10" fill="#e8f2eb"/>
  <!-- Milk line -->
  <rect x="196" y="290" width="120" height="90" rx="0 0 30 30" fill="#a8c9b4"/>
  <!-- Measurement lines -->
  <line x1="210" y1="260" x2="230" y2="260" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="210" y1="290" x2="240" y2="290" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="210" y1="320" x2="230" y2="320" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
</svg>
