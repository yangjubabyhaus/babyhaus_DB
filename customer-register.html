<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BABY HAÜS · 고객 정보 등록</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --cream:#fdf8f2;--cream2:#f5ede0;
  --sage:#7aab8a;--sage-light:#e8f2eb;--sage-dark:#558a68;
  --coral:#e8856a;--coral-light:#fdeee9;
  --gold:#c9a84c;--dark:#2d2a26;--mid:#7a7268;--light:#b8b0a4;--white:#fff;
  --shadow:0 4px 24px rgba(45,42,38,.10);--radius:20px;--radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Gowun Dodum',sans-serif;background:linear-gradient(145deg,#fdf8f2 0%,#f0ebe0 50%,#e8f2eb 100%);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px 80px;}
.container{width:100%;max-width:540px;}

.store-header{text-align:center;margin-bottom:24px;}
.store-logo{font-size:48px;margin-bottom:8px;}
.store-name{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;color:var(--dark);}
.store-tagline{font-size:13px;color:var(--mid);margin-top:5px;line-height:1.6;}

/* MODE TABS */
.mode-bar{display:flex;gap:4px;background:rgba(45,42,38,.07);padding:4px;border-radius:14px;margin-bottom:22px;}
.mode-btn{flex:1;padding:10px;border:none;border-radius:11px;background:transparent;font-family:'Gowun Dodum',sans-serif;font-size:13px;cursor:pointer;color:var(--mid);transition:all .18s;}
.mode-btn.active{background:var(--white);color:var(--dark);font-weight:700;box-shadow:0 2px 8px rgba(45,42,38,.10);}

/* STEP BAR */
.step-bar{display:flex;align-items:center;justify-content:center;margin-bottom:22px;}
.step-item{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;max-width:90px;}
.step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--cream2);color:var(--light);transition:all .3s;}
.step-dot.active{background:var(--sage);color:#fff;box-shadow:0 4px 12px rgba(122,171,138,.4);}
.step-dot.done{background:var(--sage-dark);color:#fff;}
.step-lbl{font-size:10px;color:var(--light);text-align:center;white-space:nowrap;}
.step-lbl.active{color:var(--sage-dark);font-weight:600;}
.step-conn{flex:1;height:2px;background:var(--cream2);max-width:36px;transition:background .3s;}
.step-conn.done{background:var(--sage);}

/* CARD */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px 22px;margin-bottom:16px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.section-title{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:600;color:var(--dark);margin-bottom:16px;padding-bottom:11px;border-bottom:2px solid var(--cream2);}

/* TYPE */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin:14px 0 18px;}
.type-card{padding:20px 12px;border:2.5px solid var(--cream2);border-radius:var(--radius);cursor:pointer;text-align:center;transition:all .22s;background:var(--cream);}
.type-card:hover{border-color:var(--light);transform:translateY(-2px);}
.type-card.sp{border-color:var(--coral);background:var(--coral-light);}
.type-card.sn{border-color:var(--sage);background:var(--sage-light);}
.tc-icon{font-size:36px;margin-bottom:9px;}
.tc-title{font-weight:700;font-size:15px;color:var(--dark);}
.tc-desc{font-size:11px;color:var(--mid);margin-top:4px;line-height:1.5;}

/* FORM */
.form-group{margin-bottom:15px;}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--dark);margin-bottom:6px;}
.req{color:var(--coral);margin-left:2px;}
.form-input{width:100%;padding:13px 15px;border:2px solid var(--cream2);border-radius:var(--radius-sm);font-size:16px;font-family:'Gowun Dodum',sans-serif;color:var(--dark);background:var(--cream);transition:all .18s;outline:none;-webkit-appearance:none;}
.form-input:focus{border-color:var(--sage);background:#fff;}
.form-input::placeholder{color:var(--light);}
.input-row{display:flex;gap:8px;}
.input-row .form-input{flex:1;}
.btn-sub{padding:13px 15px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:700;font-family:'Gowun Dodum',sans-serif;cursor:pointer;white-space:nowrap;transition:all .18s;background:var(--sage);color:#fff;flex-shrink:0;}
.btn-sub:hover{background:var(--sage-dark);}

.info-box{background:var(--sage-light);border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;color:var(--sage-dark);margin:12px 0;line-height:1.7;display:flex;gap:9px;}
.ii{font-size:16px;flex-shrink:0;margin-top:1px;}
.warn-box{background:var(--coral-light);border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;color:#b35c3e;margin:12px 0;line-height:1.7;display:flex;gap:9px;}

.agree-wrap{display:flex;align-items:flex-start;gap:12px;padding:14px;background:var(--cream);border-radius:var(--radius-sm);cursor:pointer;margin:16px 0;}
.agree-wrap input[type=checkbox]{width:20px;height:20px;margin-top:2px;accent-color:var(--sage);flex-shrink:0;cursor:pointer;}
.agree-text{font-size:13px;color:var(--dark);line-height:1.7;}

.btn-main{width:100%;padding:15px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:16px;font-weight:700;font-family:'Gowun Dodum',sans-serif;transition:all .18s;}
.btn-primary{background:linear-gradient(135deg,var(--sage),var(--sage-dark));color:#fff;box-shadow:0 4px 16px rgba(122,171,138,.35);}
.btn-primary:hover{transform:translateY(-1px);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-secondary{background:var(--cream2);color:var(--mid);}
.btn-secondary:hover{background:#e8ddd0;}
.btn-row{display:flex;gap:10px;}
.btn-row .btn-main{margin-top:0;}
.btn-coral{background:linear-gradient(135deg,var(--coral),#d4704f);color:#fff;box-shadow:0 4px 16px rgba(232,133,106,.35);}

/* SUCCESS */
.success-wrap{text-align:center;padding:8px 0;}
.success-icon{width:72px;height:72px;background:var(--sage-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;animation:pop .5s cubic-bezier(.175,.885,.32,1.275);}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.success-title{font-family:'Noto Serif KR',serif;font-size:21px;font-weight:700;color:var(--dark);margin-bottom:7px;}
.success-sub{font-size:14px;color:var(--mid);line-height:1.7;}
.code-reveal{background:var(--dark);border-radius:var(--radius-sm);padding:18px;margin:18px 0;}
.cr-lbl{font-size:11px;color:var(--light);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;}
.cr-val{font-family:monospace;font-size:26px;font-weight:700;letter-spacing:8px;color:var(--gold);}
.cr-note{font-size:12px;color:var(--light);margin-top:8px;line-height:1.6;}
.summary-box{background:var(--cream);border-radius:var(--radius-sm);padding:14px;margin:14px 0;text-align:left;}
.s-row{display:flex;padding:8px 0;border-bottom:1px solid var(--cream2);font-size:13px;}
.s-row:last-child{border-bottom:none;}
.s-key{width:95px;color:var(--mid);flex-shrink:0;}
.s-val{color:var(--dark);font-weight:600;}
.gift-list{background:var(--cream);border-radius:var(--radius-sm);padding:14px;margin:12px 0;text-align:left;}
.gl-title{font-size:12px;font-weight:700;color:var(--mid);letter-spacing:.5px;margin-bottom:9px;}
.g-row{display:flex;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--cream2);font-size:13px;}
.g-row:last-child{border-bottom:none;}
.g-dot{width:8px;height:8px;border-radius:50%;background:var(--sage);flex-shrink:0;}
.g-date{color:var(--mid);min-width:90px;}
.g-name{color:var(--dark);}

/* VERIFY MODE */
.verify-result{text-align:center;padding:10px 0;}
.verify-icon{font-size:48px;margin-bottom:12px;}
.verify-title{font-family:'Noto Serif KR',serif;font-size:19px;font-weight:700;color:var(--dark);margin-bottom:8px;}
.verify-sub{font-size:13px;color:var(--mid);line-height:1.7;}
.current-date-box{background:var(--cream2);border-radius:var(--radius-sm);padding:14px;margin:14px 0;text-align:left;}
.cdb-label{font-size:12px;color:var(--mid);margin-bottom:4px;}
.cdb-val{font-size:16px;font-weight:700;color:var(--dark);}

.footer-note{text-align:center;font-size:12px;color:var(--light);margin-top:18px;}
</style>

<body>
<div class="container">
  <div class="store-header">
    <div class="store-name">BABY HAÜS</div>
    <div class="store-tagline">소중한 아이의 성장을 함께합니다<br>정보를 등록하시면 특별한 선물을 드려요 🎁</div>
  </div>

  <!-- 상단 모드 탭 -->
  <div class="mode-bar">
    <button class="mode-btn active" id="tab-register" onclick="switchMode('register')">📝 처음 등록하기</button>
    <button class="mode-btn" id="tab-correct" onclick="switchMode('correct')">🔑 출산일 수정하기</button>
  </div>

  <div id="page"></div>
  <div class="footer-note">개인정보는 베이비하우스 서비스제공 목적으로만 사용됩니다</div>
</div>

<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
// ===== STATE =====
let mode = 'register'; // 'register' | 'correct'
let step = 1;
let selType = null;
let selStore = '';
let fd = {};

// ===== UTILS =====
function genId(){ return 'c'+Date.now()+Math.random().toString(36).slice(2,5); }
function genCode(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s=''; for(let i=0;i<8;i++) s+=c[Math.floor(Math.random()*c.length)]; return s;
}
function formatDate(s){
  if(!s) return '-';
  const d=new Date(s);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}
function buildGifts(type, base){
  if(!base) return [];
  const d=new Date(base), g=[];
  if(type==='pregnant') g.push({label:'출산 축하 선물 🎀', date:base, sent:false});
  for(let y=1;y<=3;y++){
    const nd=new Date(d); nd.setFullYear(nd.getFullYear()+y);
    g.push({label: y===3?'세 번째 생일 선물 🎂 (36개월)':`${['첫','두','세'][y-1]} 번째 생일 선물 🎁`, date:nd.toISOString().split('T')[0], sent:false});
  }
  return g;
}

// ===== STORAGE (Supabase) =====
async function getStorage(){
  try{
    const { data, error } = await _SB.from('customers').select('*');
    if(error){ console.error('getStorage error:', error); return []; }
    return data || [];
  }catch(e){ console.error(e); return []; }
}
async function saveStorage(arr){
  // 개별 upsert 처리
  try{
    const { error } = await _SB.from('customers').upsert(arr, { onConflict: 'id' });
    if(error) console.error('saveStorage error:', error);
  }catch(e){ console.error(e); }
}
async function saveOneCustomer(customer){
  try{
    const { error } = await _SB.from('customers').upsert([customer], { onConflict: 'id' });
    if(error) console.error('saveOneCustomer error:', error);
  }catch(e){ console.error(e); }
}

// ===== MODE SWITCH =====
function switchMode(m){
  mode = m;
  step = 1; selType = null; fd = {};
  document.getElementById('tab-register').className = 'mode-btn' + (m==='register'?' active':'');
  document.getElementById('tab-correct').className = 'mode-btn' + (m==='correct'?' active':'');
  render();
}

// ===== STEP BAR =====
const STEPS_REG = ['유형 선택', '정보 입력', '완료'];
function renderBar(){
  const steps = STEPS_REG;
  document.getElementById('page').insertAdjacentHTML('afterbegin',
    `<div class="step-bar">${steps.map((lbl,i)=>{
      const n=i+1, cl=n<step?'done':n===step?'active':'';
      const conn=i<steps.length-1?`<div class="step-conn ${n<step?'done':''}"></div>`:'';
      return`<div class="step-item"><div class="step-dot ${cl}">${n<step?'✓':n}</div><div class="step-lbl ${n===step?'active':''}">${lbl}</div></div>${conn}`;
    }).join('')}</div>`
  );
}

// ===== RENDER =====
function render(){
  const pg = document.getElementById('page');
  pg.innerHTML = '';
  if(mode==='register'){
    if(step===1) r_type();
    if(step===2) r_form();
    if(step===3) r_success();
  }
  if(mode==='correct'){
    r_correct();
  }
}

// ===== REGISTER: STEP 1 - TYPE =====
function r_type(){
  document.getElementById('page').innerHTML = `
  <div class="step-bar" id="sb"></div>
  <div class="card">
    <div class="section-title">🏪 방문하신 매장을 선택해주세요</div>
    <div class="type-grid">
      <div class="type-card ${selStore==='dobong'?'sn':''}" onclick="selStore='dobong';r_type()">
        <div class="tc-icon">🏪</div>
        <div class="tc-title">도봉점</div>
      </div>
      <div class="type-card ${selStore==='yangju'?'sn':''}" onclick="selStore='yangju';r_type()">
        <div class="tc-icon">🏪</div>
        <div class="tc-title">양주점</div>
      </div>
    </div>
    <div class="section-title" style="margin-top:4px">💬 어떤 경우에 해당하시나요?</div>
    <div class="type-grid">
      <div class="type-card ${selType==='pregnant'?'sn':''}" onclick="selType='pregnant';r_type()">
        <div class="tc-icon">🤰</div>
        <div class="tc-title">임산부예요</div>
        <div class="tc-desc">출산 예정일 기준 등록<br>실제 생일 1회 수정 가능</div>
      </div>
      <div class="type-card ${selType==='normal'?'sn':''}" onclick="selType='normal';r_type()">
        <div class="tc-icon">👶</div>
        <div class="tc-title">아이가 있어요</div>
        <div class="tc-desc">실제 생년월일로 등록<br>생일 수정 불가</div>
      </div>
    </div>
    <button class="btn-main btn-primary" onclick="goStep(2)" ${!selType||!selStore?'disabled':''}>다음으로 →</button>
  </div>`;
  updateBar();
}

function r_form(){
  const ip = selType==='pregnant';
  document.getElementById('page').innerHTML = `
  <div class="step-bar" id="sb"></div>
  <div class="card">
    <div class="section-title">📝 정보 입력</div>
    ${ip
      ?`<div class="info-box"><span class="ii">ℹ️</span><div>출산 예정일 기준으로 등록됩니다. 출산 후 <strong>인증코드</strong>로 실제 출산일을 1회 수정하실 수 있어요.</div></div>`
      :`<div class="warn-box"><span class="ii">⚠️</span><div>아이의 생년월일은 등록 후 <strong>수정이 불가</strong>합니다. 정확하게 입력해주세요.</div></div>`
    }
    <div class="form-group">
      <label class="form-label">보호자 성함 <span class="req">*</span></label>
      <input class="form-input" id="f-name" type="text" placeholder="예) 김민지" value="${fd.name||''}" autocomplete="name"/>
    </div>
    <div class="form-group">
      <label class="form-label">연락처 <span class="req">*</span></label>
      <input class="form-input" id="f-phone" type="tel" placeholder="010-0000-0000" value="${fd.phone||''}"
        oninput="this.value=fmtPhone(this.value)" maxlength="13"/>
    </div>
    <div class="form-group">
      <label class="form-label">배송 주소 <span class="req">*</span></label>
      <div class="input-row" style="margin-bottom:8px">
        <input class="form-input" id="f-addr" type="text" placeholder="주소를 검색하거나 직접 입력하세요"
          value="${fd.addr||''}" />
        <button class="btn-sub" onclick="addrSearch()" id="addr-btn">🔍 검색</button>
      </div>
      <input class="form-input" id="f-addr2" type="text" placeholder="상세주소 (동·호수)" value="${fd.addr2||''}"/>
    </div>
    <div class="form-group">
      <label class="form-label">아이 이름 <span class="req">*</span></label>
      <input class="form-input" id="f-child" type="text" placeholder="예) 민준" value="${fd.childName||''}"/>
    </div>
    <div class="form-group">
      <label class="form-label">${ip?'출산 예정일':'아이 생년월일'} <span class="req">*</span></label>
      <input class="form-input" id="f-date" type="date" value="${fd.date||''}"/>
    </div>
    <label class="agree-wrap" for="agr">
      <input type="checkbox" id="agr" ${fd.agreed?'checked':''}/>
      <span class="agree-text">개인정보 수집·이용에 동의합니다.<br>
        <strong>수집 항목:</strong> 이름, 연락처, 주소, 아이 정보<br>
        <strong>이용 목적:</strong> 회원 가입, 서비스 제공, 고객 상담, 마케팅 정보발신</span>
    </label>
    <div class="btn-row">
      <button class="btn-main btn-secondary" onclick="goStep(1)">← 이전</button>
      <button class="btn-main btn-primary" onclick="submit()">✅ 등록 완료</button>
    </div>
  </div>`;
  updateBar();
}

function fmtPhone(v){
  const d=v.replace(/\D/g,'').slice(0,11);
  if(d.length<=3) return d;
  if(d.length<=7) return d.slice(0,3)+'-'+d.slice(3);
  return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7);
}
function addrSearch(){
  // 카카오 주소 API — 파일로 직접 열 때(file://)는 동작하지 않아 직접 입력으로 대체됩니다.
  // 배포(https://) 환경에서는 정상 동작합니다.
  if(typeof daum !== 'undefined' && daum.Postcode){
    new daum.Postcode({oncomplete:function(d){
      document.getElementById('f-addr').value = d.userSelectedType==='R'?d.roadAddress:d.jibunAddress;
      document.getElementById('f-addr2').focus();
    }}).open();
  } else {
    const btn = document.getElementById('addr-btn');
    if(btn){ btn.textContent='✏️ 직접입력'; btn.disabled=true; btn.style.opacity='0.5'; }
    const inp = document.getElementById('f-addr');
    inp.placeholder='주소를 직접 입력해주세요 (예: 서울시 강남구 역삼동 123)';
    inp.focus();
    // 안내 메시지
    let note = document.getElementById('addr-note');
    if(!note){
      note = document.createElement('div');
      note.id = 'addr-note';
      note.style.cssText='font-size:12px;color:#b35c3e;margin-top:5px;';
      note.textContent='⚠️ 주소 검색은 인터넷 배포 후 사용 가능합니다. 지금은 직접 입력해주세요.';
      inp.parentElement.parentElement.appendChild(note);
    }
  }
}
async function submit(){
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const addr = document.getElementById('f-addr').value.trim();
  const addr2 = document.getElementById('f-addr2').value.trim();
  const childName = document.getElementById('f-child').value.trim();
  const date = document.getElementById('f-date').value;
  const agreed = document.getElementById('agr').checked;
  if(!name||!phone||!addr||!childName||!date){ alert('모든 필수 항목을 입력해주세요.'); return; }
  if(!agreed){ alert('개인정보 수집·이용에 동의해주세요.'); return; }
  const fullAddr = addr2?`${addr} ${addr2}`:addr;
  const ip = selType==='pregnant';
  const code = ip ? genCode() : null;
  const gifts = buildGifts(selType, date);
  const customer = {
    store: selStore,
    id: genId(), type: selType, name, phone, address: fullAddr, childName,
    ...(ip ? {dueDate:date, actualBirthDate:null, birthDateModified:false, verificationCode:code} : {birthDate:date}),
    registeredAt: new Date().toISOString().split('T')[0], gifts
  };
  await saveOneCustomer(customer);
  fd = {...fd, name, phone, addr, addr2, childName, date, agreed:true, saved:customer};
  goStep(3);
}

// ===== REGISTER: STEP 3 - SUCCESS =====
function r_success(){
  const c = fd.saved; if(!c){ goStep(1); return; }
  const ip = c.type==='pregnant';
  const base = ip?c.dueDate:c.birthDate;
  document.getElementById('page').innerHTML = `
  <div class="step-bar" id="sb"></div>
  <div class="card">
    <div class="success-wrap">
      <div class="success-icon">🎉</div>
      <div class="success-title">등록이 완료됐어요!</div>
      <div class="success-sub">${c.name}님, 환영합니다 🌿<br>${c.childName}(이)의 소중한 순간을 함께하겠습니다</div>
      <div class="summary-box">
        <div class="s-row"><span class="s-key">보호자</span><span class="s-val">${c.name}</span></div>
        <div class="s-row"><span class="s-key">연락처</span><span class="s-val">${c.phone}</span></div>
        <div class="s-row"><span class="s-key">아이 이름</span><span class="s-val">${c.childName}</span></div>
        <div class="s-row"><span class="s-key">${ip?'출산 예정일':'생년월일'}</span><span class="s-val">${formatDate(base)}</span></div>
        <div class="s-row"><span class="s-key">배송 주소</span><span class="s-val">${c.address}</span></div>
      </div>
      ${ip?`
      <div class="code-reveal">
        <div class="cr-lbl">🔑 출산일 수정 인증코드</div>
        <div class="cr-val">${c.verificationCode}</div>
        <div class="cr-note">출산 후 위 탭의 <strong>"출산일 수정하기"</strong>에서 사용하세요<br>코드는 1회만 사용 가능합니다 — 꼭 보관해주세요!</div>
      </div>`:''}
      <div class="gift-list">
        <div class="gl-title">🎁 예정된 선물 일정</div>
        ${c.gifts.map(g=>`
          <div class="g-row">
            <div class="g-dot"></div>
            <div class="g-date">${formatDate(g.date)}</div>
            <div class="g-name">${g.label}</div>
          </div>`).join('')}
      </div>
      <button class="btn-main btn-secondary" style="margin-top:8px" onclick="reset()">처음으로 돌아가기</button>
    </div>
  </div>`;
  updateBar();
}

// ===== CORRECT MODE - 출산일 수정 =====
let correctState = 'input'; // 'input' | 'confirm' | 'done'
let correctCustomer = null;

function r_correct(){
  if(correctState==='input') r_correct_input();
  if(correctState==='confirm') r_correct_confirm();
  if(correctState==='done') r_correct_done();
}

function r_correct_input(){
  document.getElementById('page').innerHTML = `
  <div class="card">
    <div class="section-title">🔑 실제 출산일 수정</div>
    <div class="info-box">
      <span class="ii">ℹ️</span>
      <div>등록 시 받으신 <strong>8자리 인증코드</strong>와 실제 출산일을 입력해주세요. 코드는 1회만 사용 가능합니다.</div>
    </div>
    <div class="form-group">
      <label class="form-label">인증코드 8자리 <span class="req">*</span></label>
      <input class="form-input" id="vc" type="text" placeholder="예) AB3X9K2M" maxlength="8"
        style="font-family:monospace;letter-spacing:6px;font-size:20px;text-align:center;text-transform:uppercase;font-weight:700"
        oninput="this.value=this.value.toUpperCase()"/>
    </div>
    <div class="form-group">
      <label class="form-label">실제 출산일 <span class="req">*</span></label>
      <input class="form-input" id="vd" type="date"/>
    </div>
    <button class="btn-main btn-coral" onclick="doCorrectLookup()" style="margin-top:4px">다음으로 →</button>
  </div>`;
}

function doCorrectLookup(){
  const code = document.getElementById('vc').value.trim().toUpperCase();
  const date = document.getElementById('vd').value;
  if(!code||code.length!==8){ alert('8자리 인증코드를 입력해주세요.'); return; }
  if(!date){ alert('실제 출산일을 선택해주세요.'); return; }

  const all = getStorage();
  const c = all.find(x=>x.type==='pregnant' && x.verificationCode===code);
  if(!c){ alert('유효하지 않은 인증코드입니다.\n코드를 다시 확인해주세요.'); return; }
  if(c.birthDateModified){ alert('이미 사용된 인증코드입니다.\n출산일 수정은 1회만 가능합니다.'); return; }

  correctCustomer = {c, newDate: date};
  correctState = 'confirm';
  r_correct_confirm();
}

function r_correct_confirm(){
  const {c, newDate} = correctCustomer;
  document.getElementById('page').innerHTML = `
  <div class="card">
    <div class="section-title">✅ 정보를 확인해주세요</div>
    <div class="warn-box">
      <span class="ii">⚠️</span>
      <div>출산일 수정은 <strong>1회만 가능</strong>합니다. 아래 정보가 맞는지 꼭 확인해주세요.</div>
    </div>
    <div class="current-date-box">
      <div class="cdb-label">등록된 출산 예정일</div>
      <div class="cdb-val">${formatDate(c.dueDate)}</div>
    </div>
    <div style="text-align:center;font-size:24px;margin:8px 0">↓</div>
    <div class="current-date-box" style="background:var(--sage-light);border:2px solid var(--sage)">
      <div class="cdb-label" style="color:var(--sage-dark)">변경할 실제 출산일</div>
      <div class="cdb-val" style="color:var(--sage-dark)">${formatDate(newDate)}</div>
    </div>
    <div class="summary-box" style="margin-top:16px">
      <div class="s-row"><span class="s-key">보호자</span><span class="s-val">${c.name}</span></div>
      <div class="s-row"><span class="s-key">아이 이름</span><span class="s-val">${c.childName}</span></div>
    </div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn-main btn-secondary" onclick="correctState='input';r_correct()">← 다시 입력</button>
      <button class="btn-main btn-coral" onclick="doCorrectFinal()">✅ 수정 확정</button>
    </div>
  </div>`;
}

async function doCorrectFinal(){
  const {c, newDate} = correctCustomer;
  const all = await getStorage();
  const target = all.find(x=>x.id===c.id);
  if(!target){ alert('오류가 발생했습니다. 다시 시도해주세요.'); return; }

  target.actualBirthDate = newDate;
  target.birthDateModified = true;
  target.type = 'normal'; // 출산 완료 → 임산부에서 일반으로 자동 전환

  // 선물 일정 재계산
  const base = new Date(newDate);
  const gifts = [{label:'출산 축하 선물 🎀', date:newDate, sent:false}];
  for(let y=1;y<=3;y++){
    const nd = new Date(base); nd.setFullYear(nd.getFullYear()+y);
    gifts.push({
      label: y===3?'세 번째 생일 선물 🎂 (36개월)':`${['첫','두','세'][y-1]} 번째 생일 선물 🎁`,
      date: nd.toISOString().split('T')[0], sent:false
    });
  }
  target.gifts = gifts;

  await saveOneCustomer(target);
  correctCustomer = {...correctCustomer, updated: target};
  correctState = 'done';
  r_correct_done();
}

function r_correct_done(){
  const {updated} = correctCustomer;
  document.getElementById('page').innerHTML = `
  <div class="card">
    <div class="success-wrap">
      <div class="success-icon">🎊</div>
      <div class="success-title">출산일이 수정됐어요!</div>
      <div class="success-sub">${updated.name}님, 축하드립니다 🌸<br>${updated.childName}(이)의 탄생을 진심으로 축하해요</div>
      <div class="current-date-box" style="background:var(--sage-light);margin:16px 0;text-align:left">
        <div class="cdb-label" style="color:var(--sage-dark)">등록된 실제 출산일</div>
        <div class="cdb-val" style="color:var(--sage-dark)">${formatDate(updated.actualBirthDate)}</div>
      </div>
      <div class="gift-list">
        <div class="gl-title">🎁 변경된 선물 일정</div>
        ${updated.gifts.map(g=>`
          <div class="g-row">
            <div class="g-dot" style="${g.sent?'background:var(--light)':''}"></div>
            <div class="g-date" style="${g.sent?'text-decoration:line-through;color:var(--light)':''}">
              ${formatDate(g.date)}
            </div>
            <div class="g-name" style="${g.sent?'color:var(--light)':''}">${g.label} ${g.sent?'(발송 완료)':''}</div>
          </div>`).join('')}
      </div>
      <button class="btn-main btn-secondary" style="margin-top:8px" onclick="resetCorrect()">처음으로</button>
    </div>
  </div>`;
}

function resetCorrect(){
  correctState='input'; correctCustomer=null;
  r_correct_input();
}

// ===== NAVIGATION =====
function goStep(n){
  step=n;
  if(n===1){selType=null;selStore='';fd={};}
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function reset(){ mode='register'; step=1; selType=null; selStore=''; fd={}; switchMode('register'); }
function updateBar(){
  const sb=document.getElementById('sb'); if(!sb)return;
  sb.outerHTML=`<div class="step-bar">${STEPS_REG.map((lbl,i)=>{
    const n=i+1,cl=n<step?'done':n===step?'active':'';
    const conn=i<STEPS_REG.length-1?`<div class="step-conn ${n<step?'done':''}"></div>`:'';
    return`<div class="step-item"><div class="step-dot ${cl}">${n<step?'✓':n}</div><div class="step-lbl ${n===step?'active':''}">${lbl}</div></div>${conn}`;
  }).join('')}</div>`;
}

render();
</script>
</body>
</html>
